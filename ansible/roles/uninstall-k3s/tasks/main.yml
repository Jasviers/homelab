---
- name: Stop k3s service
  systemd:
    name: k3s
    state: stopped

- name: Run k3s uninstall script
  shell: /usr/local/bin/k3s-uninstall.sh

- name: Remove k3s directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/rancher
    - /var/lib/rancher
    - /var/log/pods
    - /var/log/containers
    - /etc/cni/net.d

- name: Remove leftover Cilium network interfaces
  command: ip link delete {{ item }}
  loop:
    - cilium_host
    - cilium_net
    - cilium_vxlan
  register: cilium_iface_del
  failed_when: false
  changed_when: cilium_iface_del.rc == 0
