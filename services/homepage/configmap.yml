apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  # Integracion con k8s en modo cluster: Homepage autodescubre los servicios
  # leyendo las anotaciones gethomepage.dev/* de Ingresses y HTTPRoutes.
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    title: Lakasa Homelab
    favicon: https://gethomepage.dev/img/favicon.ico
    headerStyle: clean
    language: es
    # Orden y estilo de los grupos (los grupos se crean desde las anotaciones).
    layout:
      Cluster Management:
        style: row
        columns: 4
        icon: si-kubernetes

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hourCycle: h23

  # Con el autodescubrimiento de k8s no es necesario listar servicios aqui;
  # se anaden anotando su HTTPRoute. Se deja vacio a proposito.
  services.yaml: |
    []

  bookmarks.yaml: |
    - Homelab:
        - Repositorio:
            - abbr: GH
              href: https://github.com/Jasviers/homelab
        - Proxmox zoro:
            - abbr: PVE
              href: https://zoro.bonchan.org:8006
        - Proxmox nami:
            - abbr: PVE
              href: https://nami.bonchan.org:8006
        - NAS Synology:
            - abbr: NAS
              href: https://nas.bonchan.org

  docker.yaml: ""
  custom.css: ""
  custom.js: ""
