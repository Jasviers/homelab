apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: synology-iscsi-storage
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: csi.san.synology.com
parameters:
  protocol: 'iscsi'
  dsm: '192.168.1.1'
  location: '/volume1'
  fsType: 'ext4'
reclaimPolicy: Retain
allowVolumeExpansion: true
