apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: client-info-secret
  namespace: synology-csi
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: 1h
  target:
    name: client-info-secret
    creationPolicy: Owner
  data:
    - secretKey: client-info.yml
      remoteRef:
        key: synology/client-info
        property: client-info.yml
