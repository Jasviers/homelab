apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: proxmox
  namespace: proxmox
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: proxmox
  rateLimit:
    type: Local
    local:
      rules:
        - limit:
            requests: 20
            unit: Second
