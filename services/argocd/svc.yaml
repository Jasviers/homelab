apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  annotations:
    # Autodescubrimiento + widget en vivo de Homepage.
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: ArgoCD
    gethomepage.dev/description: GitOps Continuous Delivery
    gethomepage.dev/group: Cluster Management
    gethomepage.dev/icon: argocd.png
    gethomepage.dev/href: https://argocd.bonchan.org
    gethomepage.dev/widget.type: argocd
    gethomepage.dev/widget.url: http://argocd-server.argocd
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_ARGOCD_TOKEN}}"
spec:
  parentRefs:
    - name: homelab
      namespace: envoy-gateway-system
  hostnames:
    - argocd.bonchan.org
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
