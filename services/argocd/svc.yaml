apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: homelab
      namespace: envoy-gateway-system
  hostnames:
    - argocd.bonchan.org
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
        - name: argocd-server
          port: 443
