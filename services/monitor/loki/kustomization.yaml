apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: 7.0.0
    releaseName: loki
    namespace: monitoring
    valuesInline:
      deploymentMode: SingleBinary

      loki:
        auth_enabled: false
        commonConfig:
          replication_factor: 1
        schemaConfig:
          configs:
            - from: "2024-04-01"
              store: tsdb
              object_store: filesystem
              schema: v13
              index:
                prefix: index_
                period: 24h
        storage:
          type: filesystem
        limits_config:
          retention_period: 720h
        compactor:
          retention_enabled: true
          delete_request_store: filesystem

      singleBinary:
        replicas: 1
        persistence:
          enabled: true
          storageClass: synology-iscsi-storage
          size: 10Gi
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi

      backend:
        replicas: 0
      read:
        replicas: 0
      write:
        replicas: 0

      chunksCache:
        enabled: false

      resultsCache:
        enabled: false

      gateway:
        enabled: false

      lokiCanary:
        enabled: false
      test:
        enabled: false
      minio:
        enabled: false
