apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: router
  namespace: router
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Router
    gethomepage.dev/description: Panel de administración del router ASUS
    gethomepage.dev/group: Infraestructura
    gethomepage.dev/icon: asus.png
    gethomepage.dev/href: https://router.bonchan.org
spec:
  parentRefs:
    - name: homelab
      namespace: envoy-gateway-system
  hostnames:
    - router.bonchan.org
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: router
          port: 80
