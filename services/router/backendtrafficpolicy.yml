apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: router
  namespace: router
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: router
  rateLimit:
    type: Local
    local:
      rules:
        - limit:
            requests: 20
            unit: Second
