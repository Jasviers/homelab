apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-vip

labels:
  - pairs:
      app.kubernetes.io/managed-by: Kustomize

resources:
  - namespace.yaml

helmCharts:
  - name: kube-vip
    repo: https://kube-vip.github.io/helm-charts
    version: 0.9.9
    releaseName: kube-vip
    namespace: kube-vip
    valuesInline:
      config:
        address: 192.168.1.20
      env:
        cp_enable: "true"
        svc_enable: "false"
        vip_arp: "true"
        vip_interface: eth0
        vip_leaderelection: "true"
        cp_namespace: kube-system
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
          operator: Exists
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
          operator: Exists
