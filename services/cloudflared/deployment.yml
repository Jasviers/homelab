apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
  labels:
    app.kubernetes.io/name: cloudflared
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: cloudflared
      initContainers:
        - name: decode-token
          image: busybox:1.37
          command: ['sh', '-c']
          args:
            - |
              PAYLOAD=$(echo "$TUNNEL_TOKEN" | cut -d'.' -f2)
              UUID=$(echo "$PAYLOAD" | tr '_-' '/+' | base64 -d | sed 's/.*"t":"\([^"]*\)".*/\1/')
              sed "s/<TUNNEL_ID>/$UUID/" /etc/cloudflared/configmap.yaml > /shared/config.yaml
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tunnel-credentials
                  key: token
          volumeMounts:
            - name: configmap
              mountPath: /etc/cloudflared/configmap.yaml
              subPath: config.yaml
              readOnly: true
            - name: shared
              mountPath: /shared
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.6.1
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yaml
            - run
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65532
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tunnel-credentials
                  key: token
          ports:
            - name: metrics
              containerPort: 2000
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: shared
              mountPath: /etc/cloudflared/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: configmap
          configMap:
            name: cloudflared
        - name: shared
          emptyDir: {}
