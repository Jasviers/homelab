apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared
  namespace: cloudflared
data:
  config.yaml: |
    tunnel: <TUNNEL_ID>
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    grace-period: 30s

    ingress:
      - hostname: hs-lakasa.bonchan.org
        service: http://192.168.1.2:8123
      - service: http_status:404
