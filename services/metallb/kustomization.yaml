apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: metallb-system

labels:
  - pairs:
      app.kubernetes.io/managed-by: Kustomize

resources:
  - namespace.yaml
  - pool.yaml

helmCharts:
  - name: metallb
    repo: https://metallb.github.io/metallb
    version: 0.16.1
    releaseName: metallb
    namespace: metallb-system
