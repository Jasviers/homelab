apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper
  namespace: whisper
  labels:
    app.kubernetes.io/name: whisper
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: whisper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whisper
    spec:
      tolerations:
        - key: dedicated
          operator: Equal
          value: ai
          effect: NoSchedule
      nodeSelector:
        workload-type: ai
      containers:
        - name: whisper
          image: rhasspy/wyoming-whisper:latest
          args:
            - --model
            - small-int8
            - --language
            - es
            - --beam-size
            - "1"
            - --cpu-threads
            - "2"
          ports:
            - name: wyoming
              containerPort: 10300
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: wyoming
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: wyoming
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: whisper-data
