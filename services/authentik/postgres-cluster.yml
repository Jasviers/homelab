# Instancia PostgreSQL dedicada a Authentik, gestionada por el operador CloudNativePG.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-db
  namespace: authentik
spec:
  instances: 1
  storage:
    size: 5Gi
    storageClass: synology-iscsi-storage
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  postgresql:
    parameters:
      shared_buffers: "32MB"
      max_connections: "50"
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
