version: 1
metadata:
  name: router-oidc
  labels:
    blueprints.goauthentik.io/instance: router-oidc
context:
  router_client_secret: !Env [ROUTER_CLIENT_SECRET, ""]
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: router-provider
    identifiers:
      name: Router
    attrs:
      name: Router
      client_type: confidential
      client_id: router
      client_secret: !Context router_client_secret
      grant_types:
        - authorization_code
        - refresh_token
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      # Callback del Relying Party OIDC de Envoy Gateway (SecurityPolicy).
      redirect_uris:
        - matching_mode: strict
          url: https://router.bonchan.org/oauth2/callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

  - model: authentik_core.application
    id: router-app
    identifiers:
      slug: router
    attrs:
      name: Router
      slug: router
      provider: !KeyOf router-provider
      meta_launch_url: https://router.bonchan.org
      meta_description: Panel de administración del router ASUS
      group: Infraestructura
