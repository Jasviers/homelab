version: 1
metadata:
  name: proxmox-oidc
  labels:
    blueprints.goauthentik.io/instance: proxmox-oidc
context:
  proxmox_client_secret: !Env [PROXMOX_CLIENT_SECRET, ""]
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: proxmox-provider
    identifiers:
      name: Proxmox
    attrs:
      name: Proxmox
      client_type: confidential
      client_id: proxmox
      client_secret: !Context proxmox_client_secret
      grant_types:
        - authorization_code
        - refresh_token
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      # Callbacks del Relying Party OIDC de Envoy Gateway (SecurityPolicy), uno por nodo/host.
      redirect_uris:
        - matching_mode: strict
          url: https://proxmox.bonchan.org/oauth2/callback
        - matching_mode: strict
          url: https://zoro.bonchan.org/oauth2/callback
        - matching_mode: strict
          url: https://nami.bonchan.org/oauth2/callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

  - model: authentik_core.application
    id: proxmox-app
    identifiers:
      slug: proxmox
    attrs:
      name: Proxmox
      slug: proxmox
      provider: !KeyOf proxmox-provider
      meta_launch_url: https://proxmox.bonchan.org
      meta_description: Virtualizacion (clúster Proxmox VE)
      group: Infraestructura
