version: 1
metadata:
  name: hubble-oidc
  labels:
    blueprints.goauthentik.io/instance: hubble-oidc
context:
  hubble_client_secret: !Env [HUBBLE_CLIENT_SECRET, ""]
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: hubble-provider
    identifiers:
      name: Hubble
    attrs:
      name: Hubble
      client_type: confidential
      client_id: hubble
      client_secret: !Context hubble_client_secret
      grant_types:
        - authorization_code
        - refresh_token
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      # Callback del Relying Party OIDC de Envoy Gateway (SecurityPolicy).
      redirect_uris:
        - matching_mode: strict
          url: https://hubble.bonchan.org/oauth2/callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

  - model: authentik_core.application
    id: hubble-app
    identifiers:
      slug: hubble
    attrs:
      name: Hubble
      slug: hubble
      provider: !KeyOf hubble-provider
      meta_launch_url: https://hubble.bonchan.org
      meta_description: Observabilidad de red del clúster (Cilium)
      group: Monitorizacion
