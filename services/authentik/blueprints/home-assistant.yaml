version: 1
metadata:
  name: home-assistant-oidc
  labels:
    blueprints.goauthentik.io/instance: home-assistant-oidc
context:
  home_assistant_client_secret: !Env [HOMEASSISTANT_CLIENT_SECRET, ""]
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: home-assistant-provider
    identifiers:
      name: Home Assistant
    attrs:
      name: Home Assistant
      client_type: confidential
      client_id: home-assistant
      client_secret: !Context home_assistant_client_secret
      grant_types:
        - authorization_code
        - refresh_token
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      # El componente OIDC de HA valida el id_token con RS256.
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      # Callback del componente OIDC de Home Assistant (hass-oidc-auth).
      redirect_uris:
        - matching_mode: strict
          url: https://hs-lakasa.bonchan.org/auth/oidc/callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]

  - model: authentik_core.application
    id: home-assistant-app
    identifiers:
      slug: home-assistant
    attrs:
      name: Home Assistant
      slug: home-assistant
      provider: !KeyOf home-assistant-provider
      meta_launch_url: https://hs-lakasa.bonchan.org
      meta_description: Domótica del hogar (Home Assistant)
      group: Hogar
