version: 1
metadata:
  name: argocd-oidc
  labels:
    blueprints.goauthentik.io/instance: argocd-oidc
context:
  argocd_client_secret: !Env [ARGOCD_CLIENT_SECRET, ""]
entries:
  - model: authentik_core.group
    id: argocd-admins
    identifiers:
      name: ArgoCD Admins
    attrs:
      name: ArgoCD Admins

  - model: authentik_providers_oauth2.scopemapping
    id: argocd-groups-scope
    identifiers:
      name: "OAuth Mapping: ArgoCD groups"
    attrs:
      name: "OAuth Mapping: ArgoCD groups"
      scope_name: groups
      description: "Grupos del usuario, usados por el RBAC de ArgoCD"
      expression: |
        return [group.name for group in request.user.ak_groups.all()]

  - model: authentik_providers_oauth2.oauth2provider
    id: argocd-provider
    identifiers:
      name: ArgoCD
    attrs:
      name: ArgoCD
      client_type: confidential
      client_id: argocd
      client_secret: !Context argocd_client_secret
      grant_types:
        - authorization_code
        - refresh_token
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: https://argocd.bonchan.org/auth/callback
        # Login por CLI de ArgoCD (argocd login --sso):
        - matching_mode: strict
          url: http://localhost:8085/auth/callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !KeyOf argocd-groups-scope

  - model: authentik_core.application
    id: argocd-app
    identifiers:
      slug: argocd
    attrs:
      name: ArgoCD
      slug: argocd
      provider: !KeyOf argocd-provider
      meta_launch_url: https://argocd.bonchan.org
      meta_description: GitOps Continuous Delivery
      group: Cluster Management
