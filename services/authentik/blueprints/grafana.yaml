version: 1
metadata:
  name: grafana-oidc
  labels:
    blueprints.goauthentik.io/instance: grafana-oidc
context:
  grafana_client_secret: !Env [GRAFANA_CLIENT_SECRET, ""]
entries:
  - model: authentik_core.group
    id: grafana-admins
    identifiers:
      name: Grafana Admins
    attrs:
      name: Grafana Admins

  - model: authentik_core.group
    id: grafana-editors
    identifiers:
      name: Grafana Editors
    attrs:
      name: Grafana Editors

  - model: authentik_providers_oauth2.scopemapping
    id: grafana-groups-scope
    identifiers:
      name: "OAuth Mapping: Grafana groups"
    attrs:
      name: "OAuth Mapping: Grafana groups"
      scope_name: groups
      description: "Grupos del usuario, usados por el mapeo de roles de Grafana"
      expression: |
        return [group.name for group in request.user.ak_groups.all()]

  - model: authentik_providers_oauth2.oauth2provider
    id: grafana-provider
    identifiers:
      name: Grafana
    attrs:
      name: Grafana
      client_type: confidential
      client_id: grafana
      client_secret: !Context grafana_client_secret
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: https://grafana.bonchan.org/login/generic_oauth
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !KeyOf grafana-groups-scope

  - model: authentik_core.application
    id: grafana-app
    identifiers:
      slug: grafana
    attrs:
      name: Grafana
      slug: grafana
      provider: !KeyOf grafana-provider
      meta_launch_url: https://grafana.bonchan.org
      meta_description: Dashboards y alertas del homelab
      group: Monitorizacion
