apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: authentik

labels:
  - pairs:
      app.kubernetes.io/managed-by: Kustomize

resources:
  - namespace.yml
  - postgres-cluster.yml
  - redis.yml
  - httproute.yml

configMapGenerator:
  - name: authentik-blueprint-argocd
    files:
      - blueprints/argocd.yaml
    options:
      disableNameSuffixHash: true
  - name: authentik-blueprint-grafana
    files:
      - blueprints/grafana.yaml
    options:
      disableNameSuffixHash: true
  - name: authentik-blueprint-hubble
    files:
      - blueprints/hubble.yaml
    options:
      disableNameSuffixHash: true
  - name: authentik-blueprint-proxmox
    files:
      - blueprints/proxmox.yaml
    options:
      disableNameSuffixHash: true
  - name: authentik-blueprint-router
    files:
      - blueprints/router.yaml
    options:
      disableNameSuffixHash: true

helmCharts:
  - name: authentik
    repo: https://charts.goauthentik.io
    version: 2026.5.3
    releaseName: authentik
    namespace: authentik
    valuesInline:
      global:
        env:
          - name: AUTHENTIK_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: authentik-secret
                key: secret_key
          - name: AUTHENTIK_POSTGRESQL__PASSWORD
            valueFrom:
              secretKeyRef:
                name: authentik-db-app
                key: password
          - name: AUTHENTIK_REDIS__HOST
            value: authentik-redis
          - name: ARGOCD_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: authentik-oidc-secrets
                key: argocd-client-secret
          - name: GRAFANA_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: authentik-oidc-secrets
                key: grafana-client-secret
          - name: HUBBLE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: authentik-oidc-secrets
                key: hubble-client-secret
          - name: PROXMOX_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: authentik-oidc-secrets
                key: proxmox-client-secret
          - name: ROUTER_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: authentik-oidc-secrets
                key: router-client-secret
      blueprints:
        configMaps:
          - authentik-blueprint-argocd
          - authentik-blueprint-grafana
          - authentik-blueprint-hubble
          - authentik-blueprint-proxmox
          - authentik-blueprint-router
      authentik:
        postgresql:
          host: authentik-db-rw
          name: authentik
          user: authentik
          port: 5432
      postgresql:
        enabled: false
      server:
        resources:
          requests:
            cpu: 100m
            memory: 350Mi
          limits:
            memory: 700Mi
      worker:
        resources:
          requests:
            cpu: 100m
            memory: 300Mi
          limits:
            memory: 600Mi
